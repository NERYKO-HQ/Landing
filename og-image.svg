<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap');
    </style>
  </defs>
  
  <!-- Background noir -->
  <rect width="1200" height="630" fill="#000000"/>
  
  <!-- NERYKO en BLANC - Inter 900 -->
  <text x="600" y="240" 
        font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif" 
        font-size="120" 
        font-weight="900" 
        fill="#FFFFFF" 
        text-anchor="middle" 
        letter-spacing="-2.4">NERYKO</text>
  
  <!-- Libérez vous de l'espace mental en ORANGE -->
  <text x="600" y="340" 
        font-family="'Inter', sans-serif" 
        font-size="42" 
        font-weight="600" 
        fill="#FF9500" 
        text-anchor="middle">Libérez vous de l'espace mental</text>
  
  <!-- Le cockpit financier en GRIS -->
  <text x="600" y="400" 
        font-family="'Inter', sans-serif" 
        font-size="28" 
        font-weight="400" 
        fill="#999999" 
        text-anchor="middle">Le cockpit financier des pros de l'audiovisuel</text>
  
  <!-- Badge BETA -->
  <rect x="80" y="540" width="180" height="50" rx="8" 
        fill="rgba(255, 149, 0, 0.15)" 
        stroke="#FF9500" 
        stroke-width="2"/>
  <text x="170" y="572" 
        font-family="'Inter', sans-serif" 
        font-size="20" 
        font-weight="600" 
        fill="#FF9500" 
        text-anchor="middle">BETA 2026</text>
  
  <!-- URL -->
  <text x="1120" y="575" 
        font-family="'Inter', sans-serif" 
        font-size="24" 
        font-weight="500" 
        fill="#666666" 
        text-anchor="end">neryko.io</text>
</svg>
