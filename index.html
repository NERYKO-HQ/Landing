<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neryko - Le cockpit financier des pros de l'audiovisuel</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --orange: #FF9500;
            --orange-dark: #E68A00;
            --black: #000000;
            --gray-900: #0A0A0A;
            --gray-800: #1A1A1A;
            --gray-700: #2A2A2A;
            --gray-400: #666666;
            --gray-300: #999999;
            --white: #FFFFFF;
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--black);
            color: var(--white);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 40px;
        }
        
        .beta-notice {
            background: rgba(255, 149, 0, 0.1);
            border-bottom: 1px solid rgba(255, 149, 0, 0.3);
            padding: 12px 0;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            color: var(--orange);
        }
        
        header {
            padding: 32px 0;
            position: sticky;
            top: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 28px;
            font-weight: 900;
            color: var(--white);
            text-decoration: none;
            letter-spacing: -0.02em;
        }
        
        nav {
            display: flex;
            gap: 48px;
            align-items: center;
        }
        
        nav a {
            color: var(--gray-300);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: color 0.2s;
            cursor: pointer;
        }
        
        nav a:hover {
            color: var(--white);
        }
        
        .btn {
            padding: 16px 32px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 15px;
            text-decoration: none;
            transition: all 0.3s;
            display: inline-block;
            border: none;
            cursor: pointer;
        }
        
        .btn-primary {
            background: var(--orange);
            color: var(--black);
        }
        
        .btn-primary:hover {
            background: var(--orange-dark);
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: transparent;
            border: 2px solid var(--gray-700);
            color: var(--white);
        }
        
        .btn-secondary:hover {
            background: var(--gray-900);
            border-color: var(--gray-400);
        }
        
        .hero {
            padding: 120px 0 160px;
            position: relative;
        }
        
        .hero-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            align-items: center;
        }
        
        .hero-content h1 {
            font-size: 96px;
            font-weight: 900;
            line-height: 0.95;
            margin-bottom: 32px;
            letter-spacing: -0.04em;
            color: var(--white);
        }
        
        .hero-content h1 .highlight {
            color: var(--orange);
        }
        
        .hero-content .subhead {
            font-size: 22px;
            color: var(--gray-300);
            line-height: 1.6;
            margin-bottom: 48px;
            max-width: 540px;
        }
        
        .cta-group {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
        }
        
        .social-proof {
            font-size: 15px;
            color: var(--gray-400);
            display: flex;
            gap: 24px;
        }
        
        .social-proof-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .check {
            color: var(--orange);
            font-weight: 700;
        }
        
        .hero-visual {
            position: relative;
        }
        
        .hero-visual img {
            width: 100%;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .creator-bio {
            padding: 80px 0;
            background: var(--gray-900);
        }
        
        .bio-content {
            max-width: 900px;
            margin: 0 auto;
            text-align: center;
        }
        
        .bio-content p {
            font-size: 20px;
            color: var(--gray-300);
            line-height: 1.7;
            margin-bottom: 16px;
            font-style: italic;
        }
        
        .bio-signature {
            font-size: 16px;
            color: var(--gray-400);
            font-weight: 600;
        }
        
        section {
            padding: 140px 0;
        }
        
        .problem-section {
            background: var(--gray-900);
        }
        
        .section-header {
            max-width: 800px;
            margin: 0 auto 80px;
            text-align: center;
        }
        
        .section-header h2 {
            font-size: 72px;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 24px;
            letter-spacing: -0.03em;
        }
        
        .section-header p {
            font-size: 20px;
            color: var(--gray-300);
            line-height: 1.6;
        }
        
        .pain-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            background: rgba(255, 255, 255, 0.05);
        }
        
        .pain-item {
            background: var(--black);
            padding: 48px 40px;
        }
        
        .pain-icon {
            font-size: 32px;
            margin-bottom: 24px;
            display: block;
            color: var(--gray-400);
            font-weight: 300;
        }
        
        .pain-item h3 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 16px;
            line-height: 1.3;
        }
        
        .pain-item p {
            font-size: 16px;
            color: var(--gray-300);
            line-height: 1.7;
            font-style: italic;
        }
        
        .stats-section {
            background: var(--black);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 60px;
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-number {
            font-size: 80px;
            font-weight: 900;
            color: var(--orange);
            line-height: 1;
            margin-bottom: 16px;
            letter-spacing: -0.02em;
        }
        
        .stat-label {
            font-size: 16px;
            color: var(--gray-300);
            font-weight: 500;
        }
        
        .features-section {
            background: var(--gray-900);
        }
        
        .feature-large {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 100px;
            align-items: center;
            margin-bottom: 100px;
        }
        
        .feature-large:nth-child(even) {
            direction: rtl;
        }
        
        .feature-large:nth-child(even) > * {
            direction: ltr;
        }
        
        .feature-content h3 {
            font-size: 56px;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 24px;
            letter-spacing: -0.02em;
        }
        
        .feature-content p {
            font-size: 20px;
            color: var(--gray-300);
            line-height: 1.7;
            margin-bottom: 24px;
        }
        
        .feature-tag {
            display: inline-block;
            padding: 8px 20px;
            background: rgba(255, 149, 0, 0.1);
            color: var(--orange);
            border: 1px solid rgba(255, 149, 0, 0.3);
            border-radius: 6px;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .feature-visual {
            background: var(--black);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }
        
        .feature-visual img {
            width: 100%;
            display: block;
        }
        
        .features-grid-small {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 60px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .feature-small {
            background: var(--black);
            padding: 48px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .feature-small h3 {
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 16px;
            letter-spacing: -0.02em;
        }
        
        .feature-small p {
            font-size: 18px;
            color: var(--gray-300);
            line-height: 1.7;
            margin-bottom: 16px;
        }
        
        .pricing-section {
            background: var(--black);
        }
        
        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            background: rgba(255, 255, 255, 0.05);
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .price-card {
            background: var(--gray-900);
            padding: 60px 48px;
            position: relative;
        }
        
        .price-card.featured {
            background: var(--black);
            border: 2px solid var(--orange);
        }
        
        .price-card h3 {
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 8px;
        }
        
        .price-card .subtitle {
            font-size: 16px;
            color: var(--gray-400);
            margin-bottom: 32px;
        }
        
        .price {
            font-size: 72px;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }
        
        .price span {
            font-size: 20px;
            color: var(--gray-400);
            font-weight: 600;
        }
        
        .price-period {
            font-size: 15px;
            color: var(--gray-400);
            margin-bottom: 40px;
        }
        
        .features-list {
            list-style: none;
            margin-bottom: 48px;
        }
        
        .features-list li {
            padding: 12px 0;
            font-size: 15px;
            color: var(--gray-300);
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }
        
        .features-list li::before {
            content: "✓";
            color: var(--orange);
            font-weight: 900;
            font-size: 18px;
            flex-shrink: 0;
        }
        
        .price-card .btn {
            width: 100%;
        }
        
        .beta-banner {
            max-width: 900px;
            margin: 80px auto 0;
            padding: 60px;
            background: linear-gradient(135deg, rgba(255, 149, 0, 0.15), rgba(255, 149, 0, 0.05));
            border: 2px solid var(--orange);
            border-radius: 12px;
            text-align: center;
        }
        
        .beta-banner h3 {
            font-size: 40px;
            font-weight: 900;
            color: var(--orange);
            margin-bottom: 16px;
            letter-spacing: -0.02em;
        }
        
        .beta-banner p {
            font-size: 20px;
            color: var(--white);
            margin-bottom: 16px;
        }
        
        .beta-banner .small-note {
            font-size: 14px;
            color: var(--gray-400);
            font-style: italic;
            margin-top: 8px;
        }
        
        .beta-banner .subtitle {
            font-size: 15px;
            color: var(--gray-400);
            margin-bottom: 32px;
        }
        
        .beta-features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin: 32px 0;
            text-align: center;
        }
        
        .beta-feature-item {
            font-size: 14px;
            color: var(--gray-300);
        }
        
        .cta-final {
            text-align: center;
            padding: 160px 0;
            background: var(--gray-900);
        }
        
        .cta-final h2 {
            font-size: 80px;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 32px;
            letter-spacing: -0.03em;
        }
        
        .cta-final .subhead {
            font-size: 22px;
            color: var(--gray-300);
            max-width: 700px;
            margin: 0 auto 60px;
        }
        
        .signup-form {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .form-row {
            display: flex;
            gap: 16px;
        }
        
        input, select {
            flex: 1;
            padding: 20px 24px;
            background: var(--black);
            border: 2px solid var(--gray-700);
            border-radius: 10px;
            color: var(--white);
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: var(--orange);
        }
        
        input::placeholder {
            color: var(--gray-400);
        }
        
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: var(--gray-400);
        }
        
        .checkbox-label input[type="checkbox"] {
            width: auto;
            cursor: pointer;
        }
        
        .reassurance {
            font-size: 14px;
            color: var(--gray-400);
            margin-top: 16px;
        }
        
        footer {
            padding: 80px 0 40px;
            background: var(--black);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .footer-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 80px;
            margin-bottom: 60px;
        }
        
        .footer-brand h3 {
            font-size: 24px;
            font-weight: 900;
            color: var(--orange);
            margin-bottom: 16px;
        }
        
        .footer-brand p {
            color: var(--gray-400);
            font-size: 15px;
            line-height: 1.7;
        }
        
        .footer-links h4 {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--gray-400);
        }
        
        .footer-links ul {
            list-style: none;
        }
        
        .footer-links li {
            margin-bottom: 12px;
        }
        
        .footer-links a {
            color: var(--gray-300);
            text-decoration: none;
            font-size: 15px;
            transition: color 0.2s;
            cursor: pointer;
        }
        
        .footer-links a:hover {
            color: var(--orange);
        }
        
        .footer-bottom {
            text-align: center;
            padding-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--gray-400);
            font-size: 14px;
        }
        
        @media (max-width: 1024px) {
            .container {
                padding: 0 24px;
            }
            
            .hero-content h1 {
                font-size: 64px;
            }
            
            .hero-grid {
                grid-template-columns: 1fr;
                gap: 60px;
            }
            
            .section-header h2 {
                font-size: 48px;
            }
            
            .pain-grid,
            .stats-grid,
            .pricing-grid,
            .features-grid-small {
                grid-template-columns: 1fr;
            }
            
            .feature-large {
                grid-template-columns: 1fr;
                gap: 40px;
            }
            
            .feature-large:nth-child(even) {
                direction: ltr;
            }
            
            .feature-content h3 {
                font-size: 40px;
            }
            
            .cta-final h2 {
                font-size: 48px;
            }
            
            .form-row {
                flex-direction: column;
            }
            
            .footer-content {
                grid-template-columns: 1fr;
                gap: 40px;
            }
            
            .beta-features {
                grid-template-columns: 1fr;
            }
            
            .beta-banner h3 {
                font-size: 28px;
            }
            
            nav {
                display: none;
            }
        }
        
</head>
<body>
    <div class="beta-notice">
        🚀 En développement — Beta prévue M6 2026 — Places limitées
    </div>
    
    <header>
        <div class="container">
            <div class="header-content">
                <a href="#" class="logo">NERYKO</a>
                <nav>
                    <a onclick="scrollToSection('features')">Fonctionnalités</a>
                    <a onclick="scrollToSection('pricing')">Tarifs</a>
                    <a onclick="scrollToSection('beta')" class="btn btn-primary">Réserver ma place</a>
                </nav>
            </div>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <div class="hero-grid">
                <div class="hero-content">
                    <h1>Arrêtez de perdre <span class="highlight">5h/mois</span> sur Excel</h1>
                    
                    <p class="subhead">
                        Centralisez tout au même endroit. Votre rentabilité, votre trésorerie, vos charges. 
                        Plus rien dans la tête, tout dans Neryko.
                    </p>
                    
                    <div class="cta-group">
                        <a onclick="scrollToSection('beta')" class="btn btn-primary">Rejoindre la beta</a>
                    </div>
                    
                    <div class="social-proof">
                        <div class="social-proof-item">
                            <span class="check">✓</span>
                            <span>Places limitées</span>
                        </div>
                        <div class="social-proof-item">
                            <span class="check">✓</span>
                            <span>Lancement M6 2026</span>
                        </div>
                    </div>
                </div>
                
                <div class="hero-visual">
                    <img src="images/dashboard.png" alt="Dashboard Neryko">
                </div>
            </div>
        </div>
    </section>

    <section class="creator-bio">
        <div class="container">
            <div class="bio-content">
                <p>"Un outil créé par un créatif du milieu qui a perdu trop de temps sur des Google Sheets bricolés, des templates Notion bancals et de l'Excel chronophage."</p>
                <p class="bio-signature">— Joris, fondateur</p>
            </div>
        </div>
    </section>

    <section class="problem-section">
        <div class="container">
            <div class="section-header">
                <h2>Vous vous reconnaissez ?</h2>
                <p>Les créatifs audiovisuels perdent un temps fou sur la gestion financière</p>
            </div>
            
            <div class="pain-grid">
                <div class="pain-item">
                    <span class="pain-icon">—</span>
                    <h3>Marge réelle ? Aucune idée.</h3>
                    <p>"J'ai vendu ce clip 5 000€, mais entre les frais cachés et le temps passé... j'ai vraiment gagné combien ?"</p>
                </div>
                
                <div class="pain-item">
                    <span class="pain-icon">—</span>
                    <h3>Heures vendues vs heures réelles</h3>
                    <p>"J'ai vendu 20h de montage. Au final j'en ai fait 40. Je me sous-paye sans m'en rendre compte."</p>
                </div>
                
                <div class="pain-item">
                    <span class="pain-icon">—</span>
                    <h3>Quel est mon vrai salaire AE ?</h3>
                    <p>"Après charges URSSAF, impôts, matos... il me reste quoi vraiment ? Je sais jamais."</p>
                </div>
            </div>
        </div>
    </section>

    <section class="stats-section">
        <div class="container">
            <div class="stats-grid">
                <div class="stat">
                    <div class="stat-number">5h</div>
                    <div class="stat-label">économisées chaque mois</div>
                </div>
                
                <div class="stat">
                    <div class="stat-number">1 clic</div>
                    <div class="stat-label">pour créer un projet</div>
                </div>
                
                <div class="stat">
                    <div class="stat-number">%</div>
                    <div class="stat-label">marges claires en temps réel</div>
                </div>
            </div>
        </div>
    </section>

    <section id="features" class="features-section">
        <div class="container">
            <div class="section-header">
                <h2>Conçu pour votre métier</h2>
                <p>Pas un énième outil de compta. Un cockpit pensé pour l'audiovisuel.</p>
            </div>
            
            <div class="feature-large">
                <div class="feature-content">
                    <h3>Rentabilité par projet</h3>
                    <p>Budget prévisionnel vs coûts réels. Heures vendues vs heures passées. Voyez votre marge finale en temps réel, sans Excel.</p>
                    <span class="feature-tag">Essentiel</span>
                </div>
                <div class="feature-visual">
                    <img src="images/rentabilite.png" alt="Rentabilité projet">
                </div>
            </div>
            
            <div class="feature-large">
                <div class="feature-content">
                    <h3>Prévisions trésorerie</h3>
                    <p>Paiements à recevoir, charges URSSAF à payer, TVA trimestrielle. Anticipez plusieurs mois à l'avance. Dormez mieux.</p>
                    <span class="feature-tag">Sérénité</span>
                </div>
                <div class="feature-visual">
                    <img src="images/tresorerie.png" alt="Trésorerie">
                </div>
            </div>
            
            <div class="feature-large">
                <div class="feature-content">
                    <h3>Suivi clients & prestataires</h3>
                    <p>Qui pèse le plus dans votre CA ? Qui faut-il relancer ? Gérez vos freelances récurrents et évitez la dépendance à un seul client.</p>
                    <span class="feature-tag">Stratégique</span>
                </div>
                <div class="feature-visual">
                    <img src="images/clients.png" alt="Suivi clients">
                </div>
            </div>
            
            <div class="features-grid-small">
                <div class="feature-small">
                    <h3>Parc matériel</h3>
                    <p>Regroupez tout votre parc matériel au même endroit : factures d'achat, dates, prix. Pour l'assurance, la revente, l'inventaire complet.</p>
                    <span class="feature-tag">Exclusif</span>
                </div>
                
                <div class="feature-small">
                    <h3>Estimez votre vrai salaire</h3>
                    <p>Auto-entrepreneurs : après charges URSSAF, impôts et achats matériel, combien il vous reste vraiment ? Neryko calcule votre salaire net réel.</p>
                    <span class="feature-tag">Clarté</span>
                </div>
            </div>
        </div>
    </section>

    <section id="pricing" class="pricing-section">
        <div class="container">
            <div class="section-header">
                <h2>Un prix simple et juste</h2>
                <p>Prix adapté à votre statut. Paiement annuel.</p>
            </div>
            
            <div class="pricing-grid">
                <div class="price-card">
                    <h3>Gratuit</h3>

        const GOOGLE_SCRIPT_URL = 'COLLE_TON_URL_ICI';
        
        const form = document.getElementById('betaForm');

        const formMessage = document.getElementById('formMessage');
        
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Désactiver le bouton pendant l'envoi
            submitBtn.disabled = true;
            submitBtn.textContent = 'Envoi en cours...';
            
            // Récupérer les données du formulaire
            const formData = {
                prenom: document.getElementById('prenom').value,
                nom: document.getElementById('nom').value,
                email: document.getElementById('email').value,
                statut: document.getElementById('statut').value
            };
            
            try {
                // Envoyer à Google Sheets
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Important pour Google Apps Script
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });
                
                // Afficher message de succès
                formMessage.style.display = 'block';
                formMessage.style.background = '#059669';
                formMessage.style.color = '#ffffff';
                formMessage.textContent = '✅ Inscription réussie ! On te recontacte très vite.';
                
                // Réinitialiser le formulaire
                form.reset();
                
                // Masquer le message après 5 secondes
                setTimeout(() => {
                    formMessage.style.display = 'none';
                }, 5000);
                
            } catch (error) {
                // Afficher message d'erreur
                formMessage.style.display = 'block';
                formMessage.style.background = '#dc2626';
                formMessage.style.color = '#ffffff';
                formMessage.textContent = '❌ Erreur lors de l\'inscription. Réessaye ou contacte-nous.';
